<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sakib360</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

/* LIGHT BACKGROUND */
body {
    background: linear-gradient(-45deg, #f5f7fa, #e4e8ee, #ffffff);
    background-size: 400% 400%;
    animation: gradient 10s ease infinite;
    color: #222;
}

/* PAGE TRANSITION */
#page-transition {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #ff2c2c;
    z-index: 9999;
    transform: scaleY(1);
    transform-origin: top;
    transition: transform 0.6s ease-in-out;
}

body.loaded #page-transition {
    transform: scaleY(0);
    transform-origin: bottom;
}

/* BACKGROUND ANIMATION */
@keyframes gradient {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* NAVBAR */
nav {
    position: fixed;
    top: 0;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 30px;
    padding: 15px;
    z-index: 1000;
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(12px);
    transition: 0.3s;
}

nav.hide {
    transform: translateY(-100%);
}

nav a {
    color: #222;
    text-decoration: none;
    transition: 0.3s;
}

nav a:hover {
    color: #ff2c2c;
}

/* HERO */
header {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
}

/* CARTOON AVATAR */
header img {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    border: 3px solid #ff2c2c;
    margin-bottom: 20px;
    animation: floatAvatar 3s ease-in-out infinite;
    transition: all 0.3s ease;
}

/* FLOAT ANIMATION */
@keyframes floatAvatar {
    0% { transform: translateY(0px) scale(1); }
    50% { transform: translateY(-12px) scale(1.05); }
    100% { transform: translateY(0px) scale(1); }
}

header img:hover {
    transform: scale(1.2) rotate(-3deg);
    box-shadow: 0 15px 35px rgba(255, 44, 44, 0.4);
}

/* TEXT */
h1 {
    font-size: 2.8rem;
}

.typing {
    color: #ff2c2c;
    margin-top: 10px;
    font-size: 1.2rem;
}

/* SECTIONS */
section {
    max-width: 900px;
    margin: 100px auto;
    padding: 25px;
    background: #fff;
    border-radius: 14px;

    opacity: 0;
    transform: translateY(60px);
    transition: all 0.8s ease;
}

section.show {
    opacity: 1;
    transform: translateY(0);
}

h2 {
    color: #ff2c2c;
    margin-bottom: 15px;
}

/* PROJECT BOX */
.project {
    background: #f3f3f3;
    padding: 15px;
    border-radius: 10px;
    margin-top: 10px;
    transition: 0.3s;
}

.project:hover {
    transform: translateY(-8px);
    box-shadow: 0 15px 30px rgba(0,0,0,0.1);
}

/* BUTTON */
button {
    margin-top: 15px;
    padding: 10px 20px;
    background: #ff2c2c;
    border: none;
    color: white;
    border-radius: 6px;
    cursor: pointer;
    width: auto;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    color: #777;
}

/* MOBILE RESPONSIVE */
@media (max-width: 768px) {

    nav {
        flex-wrap: wrap;
        gap: 15px;
        font-size: 14px;
    }

    h1 {
        font-size: 2rem;
    }

    header img {
        width: 110px;
        height: 110px;
    }

    section {
        margin: 60px 15px;
        padding: 20px;
    }

    button {
        width: 100%;
    }
}

</style>
</head>

<body>

<!-- TRANSITION -->
<div id="page-transition"></div>

<!-- NAV -->
<nav id="navbar">
    <a href="#about">About</a>
    <a href="#skills">Skills</a>
    <a href="#projects">Projects</a>
    <a href="#contact">Contact</a>
</nav>

<!-- HERO -->
<header id="hero">
    <img src=https://i.pinimg.com/originals/bd/90/a6/bd90a6c8ea07dc7390e461b655a8b1c6.jpg id="profile">
    <h1>Sakib Uddin</h1>
    <div class="typing" id="typing"></div>
</header>

<!-- ABOUT -->
<section id="about">
    <h2>About Me</h2>
    <p>I build modern, interactive web experiences with smooth animations and clean UI.</p>
</section>

<!-- SKILLS -->
<section id="skills">
    <h2>Skills</h2>
    <p>HTML, CSS, JavaScript, UI Design, Problem Solving</p>
</section>

<!-- PROJECTS -->
<section id="projects">
    <h2>Projects</h2>
    <div class="project">Portfolio Website</div>
    <div class="project">Todo App</div>
    <div class="project">Weather App</div>
</section>

<!-- CONTACT -->
<section id="contact">
    <h2>Contact</h2>
    <p>Email: p25855@psuca.edu</p>
    <button onclick="alert('Coming Soon!')">Download CV</button>
</section>

<!-- FOOTER -->
<footer>
    <p>© 2026 Sakib Uddin</p>
</footer>

<script>

/* PAGE TRANSITION */
window.addEventListener("load", () => {
    document.body.classList.add("loaded");
});

/* TYPING EFFECT */
const texts = ["Frontend Developer", "UI Designer", "Creative Thinker"];
let count = 0, index = 0, currentText = '', letter = '';

(function type() {
    if (count === texts.length) count = 0;

    currentText = texts[count];
    letter = currentText.slice(0, ++index);

    document.getElementById('typing').textContent = letter;

    if (letter.length === currentText.length) {
        count++;
        index = 0;
        setTimeout(type, 1200);
    } else {
        setTimeout(type, 60);
    }
})();

/* NAV + SCROLL ANIMATION */
const sections = document.querySelectorAll("section");
let lastScroll = 0;

window.addEventListener("scroll", () => {
    const scrollY = window.scrollY;

    // navbar hide/show
    const nav = document.getElementById("navbar");
    if (scrollY > lastScroll) nav.classList.add("hide");
    else nav.classList.remove("hide");
    lastScroll = scrollY;

    // section reveal
    sections.forEach(sec => {
        const offset = sec.offsetTop - window.innerHeight + 100;
        if (scrollY > offset) sec.classList.add("show");
    });
});

</script>

</body>
</html>
